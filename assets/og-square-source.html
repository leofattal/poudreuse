<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:1200px;overflow:hidden}
  .card{
    position:relative;width:1200px;height:1200px;
    font-family:'Nunito',sans-serif;color:#1E2447;
    background:linear-gradient(180deg,#232A5C 0%,#5D7BC4 62%,#F2C4CE 100%);
  }
  svg.scene{position:absolute;inset:0;width:1200px;height:1200px}
  .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:110px}
  h1{
    font-family:'Fredoka',sans-serif;font-weight:700;font-size:138px;line-height:.92;
    color:#fff;letter-spacing:2px;text-shadow:0 9px 0 rgba(30,36,71,.35);
    transform:rotate(-2deg);
  }
  h1 .flake{color:#FFC63D}
  .tag{
    margin-top:22px;font-size:40px;font-weight:800;color:#EAF0FF;
    text-shadow:0 3px 0 rgba(30,36,71,.3);
  }
  .chips{position:absolute;left:0;right:0;bottom:80px;display:flex;gap:18px;justify-content:center}
  .chip{
    font-weight:800;font-size:30px;padding:15px 32px;border-radius:999px;
    box-shadow:0 7px 0 rgba(30,36,71,.28);
  }
  .chip.gold{background:#FFC63D;color:#1E2447}
  .chip.coral{background:#FF5D8F;color:#fff}
  .url{position:absolute;left:0;right:0;bottom:34px;text-align:center;font-weight:800;font-size:28px;color:#fff;opacity:.9}
</style>
</head>
<body>
<div class="card">
  <svg class="scene" viewBox="0 0 1200 1200" preserveAspectRatio="none">
    <!-- moon -->
    <circle cx="1010" cy="150" r="62" fill="rgba(255,246,220,.95)"/>
    <circle cx="1034" cy="142" r="51" fill="#5D7BC4" opacity=".55"/>
    <!-- far peaks -->
    <g fill="#8FA6DC">
      <polygon points="80,930 260,660 440,930"/>
      <polygon points="380,930 560,620 740,930"/>
      <polygon points="820,930 1010,650 1200,930"/>
    </g>
    <g fill="#F4F8FF" opacity=".85">
      <polygon points="225,720 260,660 295,720"/>
      <polygon points="525,690 560,620 595,690"/>
      <polygon points="975,730 1010,650 1045,730"/>
    </g>
    <!-- mid peaks -->
    <g fill="#6E86C8">
      <polygon points="-40,980 160,720 360,980"/>
      <polygon points="560,980 780,700 1000,980"/>
      <polygon points="980,980 1140,760 1300,980"/>
    </g>
    <!-- snow ground -->
    <path d="M0,1000 Q300,950 600,990 T1200,980 L1200,1200 L0,1200 Z" fill="#F4F8FF"/>
    <path d="M0,1000 Q300,950 600,990 T1200,980" fill="none" stroke="#C9D8F0" stroke-width="7"/>
    <!-- pines -->
    <g transform="translate(160,1035)"><polygon points="-30,12 30,12 0,-46" fill="#1F4A3D"/><polygon points="-23,-18 23,-18 0,-64" fill="#1F4A3D"/><rect x="-6" y="10" width="12" height="18" fill="#3B2B22"/></g>
    <g transform="translate(1050,1040) scale(1.15)"><polygon points="-30,12 30,12 0,-46" fill="#1F4A3D"/><polygon points="-23,-18 23,-18 0,-64" fill="#1F4A3D"/><rect x="-6" y="10" width="12" height="18" fill="#3B2B22"/></g>
    <!-- falling snow -->
    <g fill="#fff" opacity=".85">
      <circle cx="120" cy="120" r="4"/><circle cx="330" cy="220" r="3"/><circle cx="520" cy="90" r="5"/>
      <circle cx="760" cy="160" r="3"/><circle cx="900" cy="300" r="4"/><circle cx="180" cy="360" r="3"/>
      <circle cx="1080" cy="420" r="4"/><circle cx="120" cy="560" r="3"/><circle cx="1120" cy="600" r="4"/>
    </g>

    <!-- SNOWBOARDER (centered) -->
    <g transform="translate(600,760) scale(3.6) rotate(-6)">
      <circle cx="0" cy="10" r="60" fill="#FFC63D" opacity=".18"/>
      <g transform="rotate(-7)">
        <rect x="-48" y="22" width="96" height="12" rx="8" fill="#FF5D8F"/>
        <rect x="-48" y="22" width="96" height="12" rx="8" fill="none" stroke="rgba(30,36,71,.35)" stroke-width="2"/>
      </g>
      <path d="M-12,20 L-14,-2" stroke="#2B3050" stroke-width="8" stroke-linecap="round"/>
      <path d="M16,18 L12,-2" stroke="#2B3050" stroke-width="8" stroke-linecap="round"/>
      <rect x="-16" y="-26" width="32" height="30" rx="10" fill="#6FD8F2" stroke="rgba(30,36,71,.25)" stroke-width="2"/>
      <path d="M-14,-18 L-30,-20" stroke="#6FD8F2" stroke-width="8" stroke-linecap="round"/>
      <path d="M14,-18 L30,-24" stroke="#6FD8F2" stroke-width="8" stroke-linecap="round"/>
      <circle cx="0" cy="-38" r="12" fill="#F5C9A8"/>
      <path d="M10,-38 Q16,-30 13,-20" stroke="#5A3825" stroke-width="3" fill="none"/>
      <path d="M-12.5,-42 A12.5,12.5 0 0 1 12.5,-42 Z" fill="#FF5D8F"/>
      <rect x="-12.5" y="-44" width="25" height="5" fill="#FF5D8F"/>
      <circle cx="0" cy="-54" r="4.5" fill="#FF5D8F"/>
      <circle cx="4" cy="-38" r="1.8" fill="#2B3050"/>
      <circle cx="9" cy="-38" r="1.8" fill="#2B3050"/>
      <path d="M4,-34.5 Q6.5,-31 9,-34.5" stroke="#2B3050" stroke-width="1.6" fill="none"/>
    </g>
  </svg>

  <div class="content">
    <h1>POUDREUSE<span class="flake"> ❄</span></h1>
    <div class="tag">Conjugue vite. Ride encore plus vite.</div>
  </div>
  <div class="chips">
    <span class="chip gold">🏂 Snowboard</span>
    <span class="chip coral">🇫🇷 Conjugaison</span>
  </div>
  <div class="url">poudreuse.vercel.app</div>
</div>
</body>
</html>
